server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Prevent nginx from issuing absolute redirects that lose the port.
    # Without this, /provider/aws → 301 http://localhost/provider/aws/ (drops :8080).
    absolute_redirect off;

    # Resolve clean URLs: /provider/aws → /provider/aws/index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets aggressively
    location ~* \.(css|js|ico|png|jpg|jpeg|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # No caching for HTML so fresh builds are picked up immediately
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    error_page 404 /404.html;

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
