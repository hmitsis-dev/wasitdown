name: Generate & Deploy Static Site

on:
  # Run every 20 minutes (after scraper has run)
  schedule:
    - cron: "5,25,45 * * * *"
  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run generator
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          OUTPUT_DIR: dist
          TEMPLATES_DIR: templates
          STATIC_DIR: static
        run: go run ./cmd/generator

      - name: Copy static assets to dist
        run: |
          cp -r static/. dist/
          cp static/robots.txt dist/robots.txt || true

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: wasitdown
          directory: dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          wranglerVersion: "3"
