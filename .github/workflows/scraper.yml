name: Run Scraper

on:
  # Every hour at 20 
  #schedule:
    #- cron: "20 * * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Install dependencies
        run: go mod download

      - name: Run scraper (once mode)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          MIGRATIONS_DIR: db/migrations
          SCRAPER_MODE: once
        run: go run ./cmd/scraper
