# Local development only — NOT for production.
# Usage:
#   docker compose -f docker-compose.local.yml up -d
#   docker compose -f docker-compose.local.yml run --rm scraper
#   docker compose -f docker-compose.local.yml run --rm generator
#   Open http://localhost:8080

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: wasitdown
      POSTGRES_USER: wasitdown
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wasitdown"]
      interval: 5s
      timeout: 5s
      retries: 5

  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scraper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://wasitdown:${POSTGRES_PASSWORD:-changeme}@postgres:5432/wasitdown?sslmode=disable
      MIGRATIONS_DIR: /app/db/migrations
      SCRAPER_MODE: once
    restart: "no"

  generator:
    build:
      context: .
      dockerfile: Dockerfile.generator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://wasitdown:${POSTGRES_PASSWORD:-changeme}@postgres:5432/wasitdown?sslmode=disable
      OUTPUT_DIR: /app/dist
      TEMPLATES_DIR: /app/templates
      STATIC_DIR: /app/static
      ADS_ENABLED: "false"
    volumes:
      - distdata:/app/dist
    restart: "no"

  web:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - generator
    ports:
      - "8080:80"
    volumes:
      - distdata:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pgdata:
  distdata:
